services:
  frontend:
    build:
      context: ./frontend
      target: dev
    command: sh -c "npm ci && npm run start"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      HOST: 0.0.0.0
      WDS_SOCKET_PORT: "0"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  backend:
    build:
      context: ./backend
      target: dev
    command: sh -c "npm ci && npm run dev"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://mockstreet:mockstreet@postgres:5432/mockstreet
      SESSION_SECRET: ${SESSION_SECRET:-dev-session-secret-not-for-production}
      ALLOWED_ORIGINS: http://localhost,http://localhost:80,http://127.0.0.1,http://127.0.0.1:80,http://localhost:3000
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
      FINNHUB_API_KEY: ${FINNHUB_API_KEY}
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mockstreet
      POSTGRES_PASSWORD: mockstreet
      POSTGRES_DB: mockstreet
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mockstreet -d mockstreet"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
  frontend_node_modules:
  backend_node_modules:
